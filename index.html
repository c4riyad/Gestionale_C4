<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Unit C4 — Programmazione</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="TUC4">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text2: #8b949e;
    --accent: #1f6feb;
    --khurais: #1a6b3c;
    --khurais-text: #56d364;
    --hotel: #9b4b00;
    --hotel-text: #ffa657;
    --licenza: #1a3a6b;
    --licenza-text: #79c0ff;
    --today: #58a6ff;
    --weekend: #30363d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-logo {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--today);
  }
  .header-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .header-updated { margin-left: auto; font-size: 11px; color: var(--text2); }

  /* ── Search ── */
  .search-wrap {
    padding: 32px 24px 16px;
    max-width: 700px;
    margin: 0 auto;
  }
  .search-label { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
  .search-box {
    position: relative;
  }
  .search-box input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 16px;
    padding: 12px 16px 12px 42px;
    outline: none;
    transition: border-color .2s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-icon {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    font-size: 18px;
    color: var(--text2);
    pointer-events: none;
  }
  .search-results {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-top: 4px;
    overflow: hidden;
    display: none;
  }
  .search-results.show { display: block; }
  .search-item {
    padding: 10px 16px;
    cursor: pointer;
    font-size: 14px;
    transition: background .15s;
  }
  .search-item:hover, .search-item.active { background: var(--surface); }
  .search-rank { font-size: 11px; color: var(--text2); margin-right: 6px; }

  /* ── Main content ── */
  #main { max-width: 1100px; margin: 0 auto; padding: 0 24px 48px; }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 80px 0;
    color: var(--text2);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h2 { font-size: 18px; color: var(--text); margin-bottom: 8px; }

  /* ── Person header ── */
  .person-header {
    display: flex;
    align-items: flex-start;
    gap: 24px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .person-name {
    font-size: 26px;
    font-weight: 700;
    flex: 1;
  }

  /* ── Status cards ── */
  .status-cards {
    display: flex;
    gap: 16px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .status-card {
    flex: 1;
    min-width: 180px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
  }
  .status-card .sc-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .status-card .sc-value { font-size: 22px; font-weight: 700; }
  .status-card .sc-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .pos-KHURAIS .sc-value { color: var(--khurais-text); }
  .pos-HOTEL   .sc-value { color: var(--hotel-text); }
  .pos-LICENZA .sc-value { color: var(--licenza-text); }

  /* ── Month sections ── */
  .month-section { margin-bottom: 32px; }
  .month-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* ── Grid ── */
  .sched-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .day-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 46px;
    border-radius: 6px;
    padding: 6px 4px;
    font-size: 11px;
    border: 1px solid transparent;
    transition: transform .1s;
    cursor: default;
  }
  .day-cell:hover { transform: scale(1.08); }
  .day-num { font-weight: 700; font-size: 14px; margin-bottom: 3px; }
  .day-name { font-size: 9px; color: var(--text2); margin-bottom: 4px; }
  .day-pos { font-size: 9px; font-weight: 600; letter-spacing: .3px; }

  .day-cell.pos-KHURAIS  { background: #0d2b1a; border-color: var(--khurais); }
  .day-cell.pos-KHURAIS .day-pos { color: var(--khurais-text); }
  .day-cell.pos-HOTEL    { background: #2b1500; border-color: var(--hotel); }
  .day-cell.pos-HOTEL   .day-pos { color: var(--hotel-text); }
  .day-cell.pos-LICENZA  { background: #0a1a2b; border-color: var(--licenza); }
  .day-cell.pos-LICENZA .day-pos { color: var(--licenza-text); }
  .day-cell.pos-empty    { background: var(--surface2); border-color: var(--border); }
  .day-cell.pos-empty   .day-pos { color: var(--text2); }

  .day-cell.is-today {
    outline: 2px solid var(--today);
    outline-offset: 1px;
  }
  .day-cell.is-weekend .day-name { color: #8b949e; }
  .day-cell.is-past { opacity: 0.45; }

  /* ── Legend ── */
  .legend {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text2);
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 3px;
  }
  .ld-KHURAIS { background: var(--khurais); }
  .ld-HOTEL   { background: var(--hotel); }
  .ld-LICENZA { background: var(--licenza); }

  /* ── Login overlay ── */
  #login-overlay {
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 40px 36px;
    width: 340px;
    text-align: center;
  }
  .login-logo { font-size: 28px; font-weight: 800; color: var(--today); letter-spacing: 1px; margin-bottom: 4px; }
  .login-sub  { font-size: 12px; color: var(--text2); margin-bottom: 28px; }
  .login-field {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-size: 15px;
    padding: 11px 14px;
    margin-bottom: 12px;
    outline: none;
    transition: border-color .2s;
  }
  .login-field:focus { border-color: var(--accent); }
  .login-btn {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 7px;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    padding: 11px;
    cursor: pointer;
    margin-top: 4px;
    transition: opacity .2s;
  }
  .login-btn:hover { opacity: .85; }
  .login-err {
    color: #f85149;
    font-size: 13px;
    margin-top: 10px;
    min-height: 18px;
  }
</style>
</head>
<body>

<!-- Login overlay -->
<div id="login-overlay">
  <div class="login-box">
    <div class="login-logo">⚡ TASK UNIT C4</div>
    <div class="login-sub">Accesso riservato al personale</div>
    <input class="login-field" id="login-user" type="text" placeholder="Nome utente" autocomplete="username">
    <input class="login-field" id="login-pass" type="password" placeholder="Password" autocomplete="current-password">
    <button class="login-btn" onclick="doLogin()">Accedi</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<header>
  <div>
    <div class="header-logo">⚡ TASK UNIT C4</div>
    <div class="header-sub">Portale Programmazione Turni</div>
  </div>
  <div class="header-updated" id="last-update"></div>
</header>

<div class="search-wrap">
  <div class="search-label">Cerca il tuo nominativo</div>
  <div class="search-box">
    <span class="search-icon">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="6.5" cy="6.5" r="5" stroke="#8b949e" stroke-width="1.5"/>
        <line x1="10.5" y1="10.5" x2="14" y2="14" stroke="#8b949e" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </span>
    <input type="text" id="search-input" placeholder="Es. PELLEGRINO, D'ELIA…"
      autocomplete="off" spellcheck="false">
    <div class="search-results" id="search-results"></div>
  </div>
</div>

<div id="main">
  <div class="empty-state" id="empty-state">
    <div class="icon">🎖️</div>
    <h2>Cerca il tuo nominativo</h2>
    <p>Digita il cognome per visualizzare la tua programmazione</p>
  </div>
  <div id="person-view" style="display:none"></div>
</div>

<script>
const DAYS_IT = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
const MONTHS_IT = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
                   'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

let DATA = null;
let selectedIndex = -1;

// ── Load data ──────────────────────────────────────────────
async function loadData() {
  try {
    const r = await fetch('data.json');
    DATA = await r.json();
    document.getElementById('last-update').textContent = 'Aggiornato: ' + DATA.generated;
  } catch(e) {
    document.getElementById('empty-state').innerHTML =
      '<div class="icon">⚠️</div><h2>Dati non disponibili</h2><p>Impossibile caricare data.json</p>';
  }
}

// ── Search ─────────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  const box = document.getElementById('search-results');
  selectedIndex = -1;
  if (!DATA || q.length < 2) { box.classList.remove('show'); return; }

  const normalize = s => s.toLowerCase().replace(/['']/g, "'");
  const matches = DATA.personnel.filter(p => normalize(p.name).includes(normalize(q)));
  if (!matches.length) { box.classList.remove('show'); return; }

  box.innerHTML = matches.map((p) => {
    const idx = DATA.personnel.indexOf(p);
    const rank = p.name.split(' ').slice(0, -1).join(' ');
    const surname = p.name.split(' ').pop();
    return `<div class="search-item" data-idx="${idx}">
      <span class="search-rank">${rank}</span><strong>${surname}</strong>
    </div>`;
  }).join('');
  box.classList.add('show');
});

document.getElementById('search-input').addEventListener('keydown', function(e) {
  const items = document.querySelectorAll('.search-item');
  if (e.key === 'ArrowDown') { selectedIndex = Math.min(selectedIndex+1, items.length-1); }
  else if (e.key === 'ArrowUp') { selectedIndex = Math.max(selectedIndex-1, 0); }
  else if (e.key === 'Enter' && selectedIndex >= 0) {
    showPerson(items[selectedIndex].dataset.name);
    return;
  } else return;
  items.forEach((it,i) => it.classList.toggle('active', i === selectedIndex));
});

document.getElementById('search-results').addEventListener('click', e => {
  const item = e.target.closest('.search-item');
  if (!item) return;
  const idx = parseInt(item.dataset.idx);
  showPerson(DATA.personnel[idx].name);
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-box'))
    document.getElementById('search-results').classList.remove('show');
});

// ── Show person ────────────────────────────────────────────
function showPerson(name) {
  const person = DATA.personnel.find(p => p.name === name);
  if (!person) return;

  document.getElementById('search-input').value = name;
  document.getElementById('search-results').classList.remove('show');
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('person-view').style.display = 'block';

  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  // Trova stato attuale e prossimo cambio
  const todayShift = person.shifts.find(s => s.date === todayStr);
  const currentPos = todayShift ? todayShift.pos : null;

  // Conta giorni rimanenti nella posizione corrente
  let daysLeft = 0;
  let nextChange = null;
  let nextPos = null;
  if (currentPos) {
    for (const s of person.shifts) {
      if (s.date < todayStr) continue;
      if (s.pos === currentPos) { daysLeft++; }
      else { nextChange = s.date; nextPos = s.pos; break; }
    }
  }

  // Card stato attuale
  const posClass = currentPos ? `pos-${currentPos}` : 'pos-empty';
  const posLabel = currentPos || '—';
  const daysLeftTxt = daysLeft > 1 ? `ancora ${daysLeft} giorn${daysLeft===1?'o':'i'}` : 'ultimo giorno';

  let nextCardHTML = '';
  if (nextChange) {
    const nd = new Date(nextChange);
    const ndStr = `${nd.getDate()} ${MONTHS_IT[nd.getMonth()]}`;
    nextCardHTML = `<div class="status-card pos-${nextPos}">
      <div class="sc-label">Prossimo cambio</div>
      <div class="sc-value">${nextPos}</div>
      <div class="sc-sub">dal ${ndStr}</div>
    </div>`;
  }

  // Raggruppa per mese
  const byMonth = {};
  for (const s of person.shifts) {
    if (!s.date) continue;
    const d = new Date(s.date);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if (!byMonth[key]) byMonth[key] = [];
    byMonth[key].push(s);
  }

  let monthsHTML = '';
  for (const [key, shifts] of Object.entries(byMonth)) {
    const d = new Date(shifts[0].date);
    const title = `${MONTHS_IT[d.getMonth()]} ${d.getFullYear()}`;
    const cells = shifts.map(s => {
      const sd = new Date(s.date);
      const isToday = s.date === todayStr;
      const isPast  = s.date < todayStr;
      const isWknd  = sd.getDay() === 0 || sd.getDay() === 6;
      const dayName = DAYS_IT[sd.getDay()];
      const posC    = s.pos ? `pos-${s.pos}` : 'pos-empty';
      const posShort = s.pos ? s.pos.substring(0,3) : '—';
      return `<div class="day-cell ${posC}${isToday?' is-today':''}${isPast?' is-past':''}${isWknd?' is-weekend':''}" title="${s.date} — ${s.pos||'—'}">
        <span class="day-num">${sd.getDate()}</span>
        <span class="day-name">${dayName}</span>
        <span class="day-pos">${posShort}</span>
      </div>`;
    }).join('');
    monthsHTML += `<div class="month-section">
      <div class="month-title">${title}</div>
      <div class="sched-grid">${cells}</div>
    </div>`;
  }

  document.getElementById('person-view').innerHTML = `
    <div class="person-header">
      <div class="person-name">${name}</div>
    </div>
    <div class="status-cards">
      <div class="status-card ${posClass}">
        <div class="sc-label">Posizione attuale</div>
        <div class="sc-value">${posLabel}</div>
        <div class="sc-sub">${currentPos ? daysLeftTxt : 'Nessun dato per oggi'}</div>
      </div>
      ${nextCardHTML}
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot ld-KHURAIS"></div> KHURAIS</div>
      <div class="legend-item"><div class="legend-dot ld-HOTEL"></div> HOTEL</div>
      <div class="legend-item"><div class="legend-dot ld-LICENZA"></div> LICENZA</div>
    </div>
    ${monthsHTML}
  `;
}

// ── Login ──────────────────────────────────────────────────
const AUTH = { user: 'admin', pass: 'Avellino.2026' };

function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  if (u === AUTH.user && p === AUTH.pass) {
    sessionStorage.setItem('c4auth', '1');
    document.getElementById('login-overlay').style.display = 'none';
  } else {
    const err = document.getElementById('login-err');
    err.textContent = 'Credenziali non valide';
    document.getElementById('login-pass').value = '';
    setTimeout(() => { err.textContent = ''; }, 3000);
  }
}

document.getElementById('login-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('login-user').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-pass').focus();
});

if (sessionStorage.getItem('c4auth') === '1') {
  document.getElementById('login-overlay').style.display = 'none';
}

loadData();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
