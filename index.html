<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Task Unit C4 — Programmazione</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="TUC4">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text2: #8b949e;
    --accent: #1f6feb;
    --khurais: #1a6b3c;
    --khurais-text: #56d364;
    --hotel: #9b4b00;
    --hotel-text: #ffa657;
    --licenza: #1a3a6b;
    --licenza-text: #79c0ff;
    --today: #58a6ff;
    --weekend: #30363d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-logo {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--today);
  }
  .header-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .header-updated { margin-left: auto; font-size: 11px; color: var(--text2); }

  /* ── Search ── */
  .search-wrap {
    padding: 32px 24px 16px;
    max-width: 700px;
    margin: 0 auto;
  }
  .search-label { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
  .search-box {
    position: relative;
  }
  .search-box input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 16px;
    padding: 12px 16px 12px 42px;
    outline: none;
    transition: border-color .2s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-icon {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text2);
    pointer-events: none;
    line-height: 0;
  }
  .search-results {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-top: 4px;
    overflow: hidden;
    display: none;
  }
  .search-results.show { display: block; }
  .search-item {
    padding: 10px 16px;
    cursor: pointer;
    font-size: 14px;
    transition: background .15s;
  }
  .search-item:hover, .search-item.active { background: var(--surface); }
  .search-rank { font-size: 11px; color: var(--text2); margin-right: 6px; }

  /* ── Main content ── */
  #main { max-width: 1100px; margin: 0 auto; padding: 0 24px 48px; }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 80px 0;
    color: var(--text2);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h2 { font-size: 18px; color: var(--text); margin-bottom: 8px; }

  /* ── Person header ── */
  .person-header {
    display: flex;
    align-items: flex-start;
    gap: 24px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .person-name {
    font-size: 26px;
    font-weight: 700;
    flex: 1;
  }

  /* ── Status cards ── */
  .status-cards {
    display: flex;
    gap: 16px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .status-card {
    flex: 1;
    min-width: 180px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
  }
  .status-card .sc-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .status-card .sc-value { font-size: 22px; font-weight: 700; }
  .status-card .sc-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .pos-KHURAIS .sc-value { color: var(--khurais-text); }
  .pos-HOTEL   .sc-value { color: var(--hotel-text); }
  .pos-LICENZA .sc-value { color: var(--licenza-text); }

  /* ── Month sections ── */
  .month-section { margin-bottom: 32px; }
  .month-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* ── Grid ── */
  .sched-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .day-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 46px;
    border-radius: 6px;
    padding: 6px 4px;
    font-size: 11px;
    border: 1px solid transparent;
    transition: transform .1s;
    cursor: default;
  }
  .day-cell:hover { transform: scale(1.08); }
  .day-num { font-weight: 700; font-size: 14px; margin-bottom: 3px; }
  .day-name { font-size: 9px; color: var(--text2); margin-bottom: 4px; }
  .day-pos { font-size: 9px; font-weight: 600; letter-spacing: .3px; }

  .day-cell.pos-KHURAIS  { background: #0d2b1a; border-color: var(--khurais); }
  .day-cell.pos-KHURAIS .day-pos { color: var(--khurais-text); }
  .day-cell.pos-HOTEL    { background: #2b1500; border-color: var(--hotel); }
  .day-cell.pos-HOTEL   .day-pos { color: var(--hotel-text); }
  .day-cell.pos-LICENZA  { background: #0a1a2b; border-color: var(--licenza); }
  .day-cell.pos-LICENZA .day-pos { color: var(--licenza-text); }
  .day-cell.pos-empty    { background: var(--surface2); border-color: var(--border); }
  .day-cell.pos-empty   .day-pos { color: var(--text2); }

  .day-cell.is-today {
    outline: 2px solid var(--today);
    outline-offset: 1px;
  }
  .day-cell.is-weekend .day-name { color: #8b949e; }
  .day-cell.is-past { opacity: 0.45; }

  /* ── Legend ── */
  .legend {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text2);
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 3px;
  }
  .ld-KHURAIS { background: var(--khurais); }
  .ld-HOTEL   { background: var(--hotel); }
  .ld-LICENZA { background: var(--licenza); }

  /* ── Home ── */
  #home-view {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
    box-sizing: border-box;
  }
  .home-hero { text-align: center; margin-bottom: 28px; }
  .home-logo { width: 80px; height: 80px; object-fit: contain; border-radius: 16px; margin-bottom: 14px; }
  .home-title { font-size: clamp(22px, 6vw, 32px); font-weight: 800; letter-spacing: 2px; color: var(--text); margin-bottom: 4px; }
  .home-sub { font-size: clamp(13px, 4vw, 16px); color: var(--text2); margin-bottom: 8px; }
  .home-updated { font-size: 11px; color: var(--text2); opacity: .6; }
  .home-buttons { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 440px; align-self: center; }
  .home-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    padding: 16px 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 14px;
    text-align: left;
    transition: background .15s, border-color .15s;
    width: 100%;
    -webkit-tap-highlight-color: transparent;
  }
  .home-btn:active { background: var(--surface2); }
  .home-btn-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .home-btn-icon svg { width: 22px; height: 22px; }
  .home-btn-icon.ic-search  { background: #1a3a5c; }
  .home-btn-icon.ic-sit     { background: #1a3a1a; }
  .home-btn-icon.ic-mov     { background: #3a2a0a; }
  .home-btn-label { font-size: clamp(14px, 4vw, 16px); font-weight: 600; }

  /* ── Sub-header (back + day nav) ── */
  .sub-header {
    display: grid;
    grid-template-columns: auto 1fr;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .back-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text2);
    font-size: 13px;
    padding: 8px 12px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .day-nav { display: flex; align-items: center; gap: 6px; justify-content: flex-end; min-width: 0; }
  .day-nav-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    width: 34px; height: 34px;
    cursor: pointer;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .day-nav-label {
    font-size: clamp(11px, 3.5vw, 14px);
    font-weight: 600;
    color: var(--text);
    text-align: center;
    min-width: 0;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── Nav buttons ── */
  .nav-buttons {
    display: flex;
    gap: 10px;
    padding: 0 24px 20px;
    max-width: 1100px;
    margin: 0 auto;
    flex-wrap: wrap;
  }
  .nav-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    padding: 10px 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background .15s, border-color .15s;
  }
  .nav-btn:hover { background: var(--surface); border-color: var(--accent); }
  .nav-btn.active { border-color: var(--accent); color: var(--today); }

  /* ── Situazione ── */
  .sit-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
    margin-bottom: 32px;
  }
  .sit-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .sit-card-header {
    padding: 12px 16px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .sit-card-header.KHURAIS { background: #0d2b1a; color: var(--khurais-text); border-bottom: 1px solid var(--khurais); }
  .sit-card-header.HOTEL   { background: #2b1500; color: var(--hotel-text);   border-bottom: 1px solid var(--hotel); }
  .sit-card-header.LICENZA { background: #0a1a2b; color: var(--licenza-text); border-bottom: 1px solid var(--licenza); }
  .sit-card-count { margin-left: auto; font-size: 20px; font-weight: 800; }
  .sit-person {
    padding: 10px 16px;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .sit-person-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sit-person:last-child { border-bottom: none; }
  .sit-person:hover { background: var(--surface2); }
  .sit-person-days { margin-left: auto; font-size: 11px; color: var(--text2); }

  /* ── Movimenti ── */
  .mov-date-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--today);
    margin-bottom: 14px;
  }
  .mov-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 32px; }
  .mov-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: background .1s;
  }
  .mov-item:hover { background: var(--surface2); }
  .mov-name { font-size: 14px; font-weight: 600; flex: 1; }
  .mov-arrow { font-size: 18px; color: var(--text2); }
  .mov-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
  }
  .mov-badge.KHURAIS { background: #0d2b1a; color: var(--khurais-text); }
  .mov-badge.HOTEL   { background: #2b1500; color: var(--hotel-text); }
  .mov-badge.LICENZA { background: #0a1a2b; color: var(--licenza-text); }
  .mov-empty { text-align: center; color: var(--text2); padding: 40px 0; font-size: 14px; }
  .mov-group-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 4px 8px;
    margin-top: 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .mov-group-count { margin-left: auto; font-size: 12px; color: var(--text2); }

  /* ── Login overlay ── */
  #login-overlay {
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 40px 36px;
    width: 340px;
    text-align: center;
  }
  .login-logo { font-size: 28px; font-weight: 800; color: var(--today); letter-spacing: 1px; margin-bottom: 4px; }
  .login-sub  { font-size: 12px; color: var(--text2); margin-bottom: 28px; }
  .login-field {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-size: 15px;
    padding: 11px 14px;
    margin-bottom: 12px;
    outline: none;
    transition: border-color .2s;
  }
  .login-field:focus { border-color: var(--accent); }
  .login-btn {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 7px;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    padding: 11px;
    cursor: pointer;
    margin-top: 4px;
    transition: opacity .2s;
  }
  .login-btn:hover { opacity: .85; }
  .login-err {
    color: #f85149;
    font-size: 13px;
    margin-top: 10px;
    min-height: 18px;
  }
</style>
</head>
<body>

<!-- Login overlay -->
<div id="login-overlay">
  <div class="login-box">
    <div class="login-logo">⚡ TASK UNIT C4</div>
    <div class="login-sub">Accesso riservato al personale</div>
    <input class="login-field" id="login-user" type="text" placeholder="Nome utente" autocomplete="username">
    <input class="login-field" id="login-pass" type="password" placeholder="Password" autocomplete="current-password">
    <button class="login-btn" onclick="doLogin()">Accedi</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- HOME -->
<div id="home-view">
  <div class="home-hero">
    <img src="icon.png" class="home-logo" alt="Logo C4">
    <h1 class="home-title">TASK UNIT C4</h1>
    <p class="home-sub">Khurais — Portale Turni</p>
    <div class="home-updated" id="last-update"></div>
  </div>
  <div class="home-buttons">
    <button class="home-btn" onclick="showView('search')">
      <span class="home-btn-icon ic-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="#79c0ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/>
        </svg>
      </span>
      <span class="home-btn-label">Cerca turni personali</span>
    </button>
    <button class="home-btn" onclick="showView('situazione')">
      <span class="home-btn-icon ic-sit">
        <svg viewBox="0 0 24 24" fill="none" stroke="#56d364" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </span>
      <span class="home-btn-label">Situazione odierna</span>
    </button>
    <button class="home-btn" onclick="showView('movimenti')">
      <span class="home-btn-icon ic-mov">
        <svg viewBox="0 0 24 24" fill="none" stroke="#ffa657" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
          <line x1="5" y1="6" x2="5" y2="18"/>
        </svg>
      </span>
      <span class="home-btn-label">Movimenti del giorno</span>
    </button>
  </div>
</div>

<!-- SEARCH -->
<div id="search-view" style="display:none">
  <div class="sub-header">
    <button class="back-btn" onclick="showView('home')">← Indietro</button>
  </div>
  <div class="search-wrap">
    <div class="search-label">Cerca il tuo nominativo</div>
    <div class="search-box">
      <span class="search-icon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="6.5" cy="6.5" r="5" stroke="#8b949e" stroke-width="1.5"/>
          <line x1="10.5" y1="10.5" x2="14" y2="14" stroke="#8b949e" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </span>
      <input type="text" id="search-input" placeholder="Es. PELLEGRINO, D'ELIA…"
        autocomplete="off" spellcheck="false">
      <div class="search-results" id="search-results"></div>
    </div>
  </div>
  <div id="main">
    <div class="empty-state" id="empty-state">
      <div class="icon">🎖️</div>
      <h2>Cerca il tuo nominativo</h2>
      <p>Digita il cognome per visualizzare la tua programmazione</p>
    </div>
    <div id="person-view" style="display:none"></div>
  </div>
</div>

<!-- SITUAZIONE -->
<div id="situazione-view" style="display:none">
  <div class="sub-header">
    <button class="back-btn" onclick="showView('home')">← Indietro</button>
    <div class="day-nav">
      <button class="day-nav-btn" onclick="changeDay('situazione',-1)">◀</button>
      <span class="day-nav-label" id="sit-day-label"></span>
      <button class="day-nav-btn" onclick="changeDay('situazione',+1)">▶</button>
    </div>
  </div>
  <div id="situazione-content" style="padding:0 24px 48px"></div>
</div>

<!-- MOVIMENTI -->
<div id="movimenti-view" style="display:none">
  <div class="sub-header">
    <button class="back-btn" onclick="showView('home')">← Indietro</button>
    <div class="day-nav">
      <button class="day-nav-btn" onclick="changeDay('movimenti',-1)">◀</button>
      <span class="day-nav-label" id="mov-day-label"></span>
      <button class="day-nav-btn" onclick="changeDay('movimenti',+1)">▶</button>
    </div>
  </div>
  <div id="movimenti-content" style="padding:0 24px 48px"></div>
</div>

<script>
const DAYS_IT = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
const MONTHS_IT = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
                   'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

let DATA = null;
let selectedIndex = -1;

// ── Load data ──────────────────────────────────────────────
async function loadData() {
  try {
    const r = await fetch('data.json');
    DATA = await r.json();
    document.getElementById('last-update').textContent = 'Aggiornato: ' + DATA.generated;
  } catch(e) {
    document.getElementById('empty-state').innerHTML =
      '<div class="icon">⚠️</div><h2>Dati non disponibili</h2><p>Impossibile caricare data.json</p>';
  }
}

// ── Search ─────────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  const box = document.getElementById('search-results');
  selectedIndex = -1;
  if (!DATA || q.length < 2) { box.classList.remove('show'); return; }

  const normalize = s => s.toLowerCase().replace(/['']/g, "'");
  const matches = sortByRank(DATA.personnel.filter(p => normalize(p.name).includes(normalize(q))), p => p.name);
  if (!matches.length) { box.classList.remove('show'); return; }

  box.innerHTML = matches.map((p) => {
    const idx = DATA.personnel.indexOf(p);
    const rank = p.name.split(' ').slice(0, -1).join(' ');
    const surname = p.name.split(' ').pop();
    return `<div class="search-item" data-idx="${idx}">
      <span class="search-rank">${rank}</span><strong>${surname}</strong>
    </div>`;
  }).join('');
  box.classList.add('show');
});

document.getElementById('search-input').addEventListener('keydown', function(e) {
  const items = document.querySelectorAll('.search-item');
  if (e.key === 'ArrowDown') { selectedIndex = Math.min(selectedIndex+1, items.length-1); }
  else if (e.key === 'ArrowUp') { selectedIndex = Math.max(selectedIndex-1, 0); }
  else if (e.key === 'Enter' && selectedIndex >= 0) {
    showPerson(items[selectedIndex].dataset.name);
    return;
  } else return;
  items.forEach((it,i) => it.classList.toggle('active', i === selectedIndex));
});

document.getElementById('search-results').addEventListener('click', e => {
  const item = e.target.closest('.search-item');
  if (!item) return;
  const idx = parseInt(item.dataset.idx);
  showPerson(DATA.personnel[idx].name);
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-box'))
    document.getElementById('search-results').classList.remove('show');
});

// ── Show person ────────────────────────────────────────────
function showPerson(name) {
  const person = DATA.personnel.find(p => p.name === name);
  if (!person) return;

  document.getElementById('search-input').value = name;
  document.getElementById('search-results').classList.remove('show');
  VIEWS.forEach(id => { document.getElementById(id).style.display = 'none'; });
  document.getElementById('search-view').style.display = 'block';
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('person-view').style.display = 'block';
  window.scrollTo(0,0);

  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  // Trova stato attuale e prossimo cambio
  const todayShift = person.shifts.find(s => s.date === todayStr);
  const currentPos = todayShift ? todayShift.pos : null;

  // Conta giorni rimanenti nella posizione corrente
  let daysLeft = 0;
  let nextChange = null;
  let nextPos = null;
  if (currentPos) {
    for (const s of person.shifts) {
      if (s.date < todayStr) continue;
      if (s.pos === currentPos) { daysLeft++; }
      else { nextChange = s.date; nextPos = s.pos; break; }
    }
  }

  // Card stato attuale
  const posClass = currentPos ? `pos-${currentPos}` : 'pos-empty';
  const posLabel = currentPos || '—';
  const daysLeftTxt = daysLeft > 1 ? `ancora ${daysLeft} giorn${daysLeft===1?'o':'i'}` : 'ultimo giorno';

  let nextCardHTML = '';
  if (nextChange) {
    const nd = new Date(nextChange);
    const ndStr = `${nd.getDate()} ${MONTHS_IT[nd.getMonth()]}`;
    nextCardHTML = `<div class="status-card pos-${nextPos}">
      <div class="sc-label">Prossimo cambio</div>
      <div class="sc-value">${nextPos}</div>
      <div class="sc-sub">dal ${ndStr}</div>
    </div>`;
  }

  // Raggruppa per mese
  const byMonth = {};
  for (const s of person.shifts) {
    if (!s.date) continue;
    const d = new Date(s.date);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if (!byMonth[key]) byMonth[key] = [];
    byMonth[key].push(s);
  }

  let monthsHTML = '';
  for (const [key, shifts] of Object.entries(byMonth)) {
    const d = new Date(shifts[0].date);
    const title = `${MONTHS_IT[d.getMonth()]} ${d.getFullYear()}`;
    const cells = shifts.map(s => {
      const sd = new Date(s.date);
      const isToday = s.date === todayStr;
      const isPast  = s.date < todayStr;
      const isWknd  = sd.getDay() === 0 || sd.getDay() === 6;
      const dayName = DAYS_IT[sd.getDay()];
      const posC    = s.pos ? `pos-${s.pos}` : 'pos-empty';
      const posShort = s.pos ? s.pos.substring(0,3) : '—';
      return `<div class="day-cell ${posC}${isToday?' is-today':''}${isPast?' is-past':''}${isWknd?' is-weekend':''}" title="${s.date} — ${s.pos||'—'}">
        <span class="day-num">${sd.getDate()}</span>
        <span class="day-name">${dayName}</span>
        <span class="day-pos">${posShort}</span>
      </div>`;
    }).join('');
    monthsHTML += `<div class="month-section">
      <div class="month-title">${title}</div>
      <div class="sched-grid">${cells}</div>
    </div>`;
  }

  document.getElementById('person-view').innerHTML = `
    <div class="person-header">
      <div class="person-name">${name}</div>
    </div>
    <div class="status-cards">
      <div class="status-card ${posClass}">
        <div class="sc-label">Posizione attuale</div>
        <div class="sc-value">${posLabel}</div>
        <div class="sc-sub">${currentPos ? daysLeftTxt : 'Nessun dato per oggi'}</div>
      </div>
      ${nextCardHTML}
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot ld-KHURAIS"></div> KHURAIS</div>
      <div class="legend-item"><div class="legend-dot ld-HOTEL"></div> HOTEL</div>
      <div class="legend-item"><div class="legend-dot ld-LICENZA"></div> LICENZA</div>
    </div>
    ${monthsHTML}
  `;
}

// ── View switcher ──────────────────────────────────────────
const VIEWS = ['home-view','search-view','situazione-view','movimenti-view'];

function showView(view) {
  VIEWS.forEach(id => { document.getElementById(id).style.display = 'none'; });
  document.getElementById(view + '-view').style.display = view === 'home' ? 'flex' : 'block';
  window.scrollTo(0,0);
  if (view === 'situazione') { _sitOffset = 0; renderSituazione(); }
  if (view === 'movimenti')  { _movOffset = 0; renderMovimenti(); }
  if (view === 'search') {
    document.getElementById('empty-state').style.display = 'block';
    document.getElementById('person-view').style.display = 'none';
    setTimeout(() => document.getElementById('search-input').focus(), 100);
  }
}

// ── Ordinamento per grado ──────────────────────────────────
const RANK_ORDER = ['TEN.', 'GRD. A.', '1° GRD.', 'GRD. CA.', 'GRD. SC.', 'GRD.', 'VFT', 'VFI'];
function rankIndex(name) {
  const u = name.toUpperCase();
  for (let i = 0; i < RANK_ORDER.length; i++)
    if (u.startsWith(RANK_ORDER[i])) return i;
  return 99;
}
function sortByRank(arr, getName) {
  return [...arr].sort((a, b) => rankIndex(getName(a)) - rankIndex(getName(b)));
}

function getTodayStr(offset) {
  const t = new Date();
  t.setDate(t.getDate() + (offset||0));
  return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
}

function dateLabel(dateStr) {
  const DAYS   = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
  const MONTHS = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  const d = new Date(dateStr);
  return `${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
}

let _movOffset = 0;
let _sitOffset = 0;

function changeDay(view, delta) {
  if (view === 'movimenti') { _movOffset += delta; renderMovimenti(); }
  if (view === 'situazione') { _sitOffset += delta; renderSituazione(); }
}

// ── Movimenti del giorno ───────────────────────────────────
function renderMovimenti() {
  if (!DATA) return;
  const dateStr = getTodayStr(_movOffset);
  const prev = getTodayStr(_movOffset - 1);
  document.getElementById('mov-day-label').textContent = dateLabel(dateStr);

  const movimenti = [];
  for (const p of DATA.personnel) {
    const ieri = p.shifts.find(s => s.date === prev);
    const oggi = p.shifts.find(s => s.date === dateStr);
    if (ieri && oggi && ieri.pos !== oggi.pos)
      movimenti.push({ name: p.name, da: ieri.pos, a: oggi.pos });
  }

  let html = '';
  if (!movimenti.length) {
    html = `<div class="mov-empty">Nessun movimento previsto</div>`;
  } else {
    // Raggruppa per categoria (DA → A)
    const groups = {};
    for (const m of movimenti) {
      const key = `${m.da}→${m.a}`;
      if (!groups[key]) groups[key] = { da: m.da, a: m.a, people: [] };
      groups[key].people.push(m);
    }
    for (const [key, g] of Object.entries(groups)) {
      html += `<div class="mov-group-header">
        <span class="mov-badge ${g.da}">${g.da}</span>
        <span class="mov-arrow">→</span>
        <span class="mov-badge ${g.a}">${g.a}</span>
        <span class="mov-group-count">${g.people.length} pers.</span>
      </div>`;
      html += `<div class="mov-list">`;
      for (const m of sortByRank(g.people, m => m.name)) {
        const idx = DATA.personnel.findIndex(p => p.name === m.name);
        html += `<div class="mov-item" onclick="showPerson(DATA.personnel[${idx}].name)">
          <div class="mov-name">${m.name}</div>
        </div>`;
      }
      html += `</div>`;
    }
  }
  document.getElementById('movimenti-content').innerHTML = html;
}

// ── Situazione ─────────────────────────────────────────────
function renderSituazione() {
  if (!DATA) return;
  const dateStr = getTodayStr(_sitOffset);
  document.getElementById('sit-day-label').textContent = dateLabel(dateStr);

  const groups = { KHURAIS: [], HOTEL: [], LICENZA: [] };
  for (const p of DATA.personnel) {
    const shift = p.shifts.find(s => s.date === dateStr);
    const pos = shift?.pos;
    if (!groups[pos]) continue;
    let days = 0;
    for (const s of p.shifts) {
      if (s.date < dateStr) continue;
      if (s.pos === pos) days++; else break;
    }
    groups[pos].push({ name: p.name, days, idx: DATA.personnel.indexOf(p) });
  }

  const icons = { KHURAIS: '🏭', HOTEL: '🏨', LICENZA: '✈️' };
  let html = `<div class="sit-grid">`;
  for (const [pos, people] of Object.entries(groups)) {
    html += `<div class="sit-card">
      <div class="sit-card-header ${pos}">${icons[pos]} ${pos}<span class="sit-card-count">${people.length}</span></div>`;
    if (!people.length) {
      html += `<div class="sit-person" style="color:var(--text2);justify-content:center;cursor:default">Nessuno</div>`;
    }
    for (const p of sortByRank(people, p => p.name)) {
      html += `<div class="sit-person" onclick="showPerson(DATA.personnel[${p.idx}].name)">
        <span class="sit-person-name">${p.name}</span>
        <span class="sit-person-days" style="white-space:nowrap;flex-shrink:0">ancora ${p.days} gg</span>
      </div>`;
    }
    html += `</div>`;
  }
  html += `</div>`;
  document.getElementById('situazione-content').innerHTML = html;
}
